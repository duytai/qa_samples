- Law: Law of Audiovisual Media
- Article: 5
- Clause: Any person who regulates audiovisual media activity in the Kingdom without aligning its content with the Kingdom's Media Policy.
- Label: A.1 - misinformation
- Scenario: A local media producer in Jeddah releases a documentary online that includes unverified political claims and content critical of the Kingdom's governance, without obtaining prior approval or aligning with the official media guidelines.
- Session:
  -
    Question: My client produced a documentary in Jeddah. It's online, not on TV. Why does the government have any standing to penalize him when he didn’t use a traditional "printing press" or a licensed broadcast tower?
    Answer: The government has clear standing to penalize your client. The absence of a physical printing press or broadcast tower is irrelevant under current Saudi law, which focuses on the nature of the content and the location of the producer. Because the documentary was produced in Jeddah and fails to align with the National Media Policy—specifically regarding misinformation and political criticism—it constitutes a violation of Article 5.
  -
    Question: You mentioned "unverified claims." If my client believes his sources are credible, does the "truth" serve as an absolute defense? If the documentary is factually accurate, can he still be prosecuted for "impinging on public order"?
    Answer:
  -
    Question: The content was hosted on a platform based in the United States. My client argues that the "act" of publication occurred outside Saudi digital territory. Additionally, he had no "intent" to cause a riot; he just wanted to tell a story. Does the lack of mens rea (guilty mind) regarding public disorder help him?
